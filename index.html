<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perch</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent;
      overflow: hidden;
      width: 100%;
      height: 100%;
      -webkit-app-region: no-drag;
    }
    #mascot-wrap {
      position: absolute;
      left: 50%;
      top: 50%;
      cursor: grab;
    }
    #mascot-wrap.dragging { cursor: grabbing; }
    .mascot-layer {
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
      font-size: 14px;
      font-weight: bold;
      line-height: 1.15;
      letter-spacing: 0;
      white-space: pre;
      text-align: left;
      user-select: none;
      -webkit-user-select: none;
    }
    #mascot-fill { position: relative; z-index: 0; color: #6ee7b7; }
    #mascot { position: relative; z-index: 1; margin-top: -113px; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.4)); }
    #mascot-bg {
      position: absolute;
      z-index: -1;
      background: rgba(15, 23, 42, 0.85);
      border-radius: 12px;
      pointer-events: none;
      width: 180px;
      height: 130px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      margin-top: -56px;
    }
    .c { color: #6ee7b7; } .b { color: #93c5fd; } .y { color: #fde047; }
    .r { color: #fca5a5; } .g { color: #4ade80; }
  </style>
</head>
<body>
  <div id="mascot-wrap">
    <div id="mascot-bg"></div>
    <pre id="mascot-fill" class="mascot-layer"></pre>
    <pre id="mascot" class="mascot-layer"></pre>
  </div>
  <script>
    const IDLE = [
      ["     _____      ","   .'     '.    ","  /  o   o  \\   "," |     __    |  ","  \\________/   ","  /| | | | \\   "," (  (     )  )  "],
      ["     _____      ","   .'     '.    ","  /  o   O  \\   "," |     __    |  ","  \\________/   ","  /| | | | \\   "," (  (     )  )  "],
      ["     _____      ","   .'     '.    ","  /  O   o  \\   "," |     __    |  ","  \\________/   ","  /| | | | \\   "," (  (     )  )  "]
    ];
    const WORKING = [
      ["     _____      ","   .'     '.    ","  /  *   *  \\   "," |     __    |  ","  \\________/   "," \\| | | | |/   ","  )( (   ) )(  "],
      ["     _____      ","   .'     '.    ","  /  *   *  \\   "," |     __    |  ","  \\________/   ","  \\| | |  |/    ","  ()(  )()( )   "],
      ["     _____      ","   .'     '.    ","  /  *   *  \\   "," |     __    |  ","  \\________/   "," /| | | | |\\   "," ()( ( ) )()()  "],
      ["     _____      ","   .'     '.    ","  /  *   *  \\   "," |     __    |  ","  \\________/   ","  \\| | | | |/   ","  ( )(   )( )   "]
    ];
    const DONE = [
      [" *   _____   *  ","   .'     '.    ","  /  ^   ^  \\   "," |    ~~     |  ","  \\________/   ","  /| | | | \\   "," (  (     )  )  "],
      ["     _____      "," * .'     '. *  ","  /  ^   ^  \\   "," |    ~~     |  ","  \\________/   ","  /| | | | \\   "," (  (     )  )  "],
      ["  *  _____  *   ","   .'     '.    ","  /  ^   ^  \\   "," |    ~~     |  ","  \\________/   ","  /| | | | \\   "," (  (     )  )  "]
    ];
    const ERROR = [
      ["     _____      ","   .'     '.    ","  /  o   o  \\   "," |     !     |  ","  \\________/   ","  /| | | | \\   "," (  (     )  )  "],
      ["     _____      ","   .'     '.    ","  /  o   o  \\   "," |     !     |  ","  \\________/   ","  /| | | | \\   "," ( (  (  )  ) ) "]
    ];
    // Petted: SAME octopus outline as Idle, happy ^ ^ eyes, sparkle accents
    const PETTED = [
      [" *   _____   *  ","   .'     '.    ","  /  ^   ^  \\   "," |     __    |  ","  \\________/   ","  /| | | | \\   "," (  (     )  )  "],
      ["     _____      "," * .'     '. *  ","  /  ^   ^  \\   "," |     __    |  ","  \\________/   ","  /| | | | \\   "," (  (     )  )  "],
      ["  *  _____  *   ","   .'     '.    ","  /  ^   ^  \\   "," |     __    |  ","  \\________/   ","  /| | | | \\   "," (  (     )  )  "]
    ];
    // Pop: bigger burst — squash-stretch + more sparkles
    const POP = [
      ["* *  _____  * * ","   .'     '.    ","  /  ^   ^  \\   "," |     __    |  ","  \\________/   ","  /| | | | \\   "," (  (     )  )  "],
      ["*  .-\"\"\"-.  *  ","  /  ^   ^  \\   "," |     __    |  ","  \\  \\__/  /    ","   '--__--'     ","  /| | | | \\   "," (  (     )  )  "],
      ["* *  _____  * * ","   .'     '.    ","  /  ^   ^  \\   "," |     __    |  ","  \\________/   ","  /| | | | \\   "," (  (     )  )  "]
    ];

    const PLAIN = { Idle: IDLE, Working: WORKING, Done: DONE, Error: ERROR, Petted: PETTED, Pop: POP };

    // Colored frames — each line wrapped in span with state color, eyes in blue
    function colorize(lines, cls) {
      return lines.map(line => `<span class="${cls}">${escapeHtml(line)}</span>`).join("\n");
    }
    function colorizeEyes(lines, cls) {
      return lines.map(line => {
        let s = escapeHtml(line);
        // Replace eye chars with blue spans
        s = s.replace(/([oO*^])  ([oO*^])/g, '<span class="b">$1</span>   <span class="b">$2</span>');
        return `<span class="${cls}">${s}</span>`;
      }).join("\n");
    }
    function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    const COLORED = {
      Idle: IDLE.map(l => colorizeEyes(l, 'c')),
      Working: WORKING.map(l => colorizeEyes(l, 'y')),
      Done: DONE.map(l => colorizeEyes(l, 'g')),
      Error: ERROR.map(l => colorizeEyes(l, 'r')),
      Petted: PETTED.map(l => colorizeEyes(l, 'c')),
      Pop: POP.map(l => colorizeEyes(l, 'c')),
    };

    // ── Fill (disabled) ───────────────────────────────────────────────
    const FILL_ENABLED = false;
    function getFillFrame() { return ''; }

    // ── State config ──────────────────────────────────────────────────
    const STATE_CONFIG = {
      Idle:    { frames: 3, fps: 1.2, dx: [0,0,0],       dy: [0,-2,0],      fill: '#6ee7b7' },
      Working: { frames: 4, fps: 3.5, dx: [-2,0,2,0],     dy: [0,-2,0,-2],   fill: '#fde047' },
      Done:    { frames: 3, fps: 1.5, dx: [0,0,0],        dy: [0,-1,0],      fill: '#4ade80' },
      Error:   { frames: 2, fps: 1.2, dx: [0,-1],          dy: [0,0],         fill: '#fca5a5' },
      Petted:  { frames: 3, fps: 5,   dx: [0,0,0],        dy: [-3,0,-3],     fill: '#6ee7b7' },
      Pop:     { frames: 3, fps: 6,   dx: [0,0,0],        dy: [-5,2,-5],     fill: '#6ee7b7' },
    };

    // ── State ─────────────────────────────────────────────────────────
    let currentState = 'Idle';
    let previousState = 'Idle';
    let frameIndex = 0;
    let animInterval = null;
    let posX = 0, posY = 0;

    // Interaction state
    let reactionTimeout = null;
    let lastReactionTime = 0;
    const REACTION_COOLDOWN = 800;
    const PETTED_DURATION = 1200;
    const POP_DURATION = 1500;
    const HOLD_THRESHOLD = 2000;

    // Drag state
    let isDragging = false;
    let dragStartX = 0, dragStartY = 0;
    let dragOffsetX = 0, dragOffsetY = 0;
    let dragMoved = false;
    const DRAG_THRESHOLD = 5;

    const mascotEl = document.getElementById('mascot');
    const fillEl = document.getElementById('mascot-fill');
    const wrapEl = document.getElementById('mascot-wrap');
    const { invoke } = window.__TAURI__.core;

    function renderFrame() {
      const cfg = STATE_CONFIG[currentState];
      const fi = frameIndex % cfg.frames;
      posX += cfg.dx[fi] || 0;
      posY += cfg.dy[fi] || 0;
      posX = Math.max(-30, Math.min(30, posX));
      posY = Math.max(-30, Math.min(30, posY));
      // Always decay towards center so mascot doesn't drift away
      posX *= 0.9;
      posY *= 0.9;
      fillEl.textContent = getFillFrame();
      fillEl.style.color = cfg.fill;
      mascotEl.innerHTML = COLORED[currentState][fi];
      wrapEl.style.transform = `translate(calc(-50% + ${posX}px), calc(-50% + ${posY}px))`;
    }

    function startAnimation() {
      stopAnimation();
      frameIndex = 0; posX = 0; posY = 0;
      renderFrame();
      animInterval = setInterval(() => { frameIndex++; renderFrame(); }, 1000 / STATE_CONFIG[currentState].fps);
    }

    function stopAnimation() { if (animInterval) { clearInterval(animInterval); animInterval = null; } }

    function setState(s) {
      if (s === currentState) return;
      console.log(`[Perch] State: ${currentState} -> ${s}`);
      currentState = s;
      startAnimation();
    }

    // ── Reactions ─────────────────────────────────────────────────────
    function triggerReaction(type) {
      const now = Date.now();
      if (now - lastReactionTime < REACTION_COOLDOWN) return;
      if (currentState === 'Petted' || currentState === 'Pop') return;
      lastReactionTime = now;
      previousState = currentState;
      console.log(`[Perch] ${type}! (was ${previousState})`);
      currentState = type;
      startAnimation();
      const dur = type === 'Pop' ? POP_DURATION : PETTED_DURATION;
      if (reactionTimeout) clearTimeout(reactionTimeout);
      reactionTimeout = setTimeout(() => {
        console.log(`[Perch] Restoring: ${previousState}`);
        currentState = previousState;
        startAnimation();
        reactionTimeout = null;
      }, dur);
    }

    // ── Mouse interaction: click / hold-to-pop / drag ─────────────────
    let holdTimer = null;
    let dragActive = false; // true while OS-native drag is in progress

    wrapEl.addEventListener('mousedown', (e) => {
      if (e.button !== 0 || dragActive) return;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      dragMoved = false;

      holdTimer = setTimeout(() => {
        if (!dragMoved && !dragActive) { triggerReaction('Pop'); holdTimer = null; }
      }, HOLD_THRESHOLD);
    });

    window.addEventListener('mousemove', (e) => {
      if (dragStartX === 0 || dragActive) return;
      const dx = e.clientX - dragStartX;
      const dy = e.clientY - dragStartY;
      if (!dragMoved && Math.abs(dx) + Math.abs(dy) > DRAG_THRESHOLD) {
        dragMoved = true;
        dragActive = true;
        if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
        wrapEl.classList.add('dragging');
        // startDragAsync will block until user releases mouse
        invoke('start_window_drag').then(() => {
          // Drag ended — persist position
          dragActive = false;
          wrapEl.classList.remove('dragging');
          setTimeout(() => {
            invoke('get_window_position').then(p => {
              if (p) invoke('save_position', { x: p.x, y: p.y }).catch(() => {});
            }).catch(() => {});
          }, 50);
        }).catch(() => { dragActive = false; });
      }
    });

    window.addEventListener('mouseup', (e) => {
      if (e.button !== 0) return;
      if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
      // Only trigger petted if no drag was active and no drag happened
      if (!dragMoved && !dragActive) {
        triggerReaction('Petted');
      }
      dragStartX = 0;
      dragStartY = 0;
      dragMoved = false;
    });

    wrapEl.addEventListener('mouseleave', () => {
      if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
    });

    // ── Init ──────────────────────────────────────────────────────────
    async function init() {
      // Restore saved position
      try {
        const pos = await invoke('get_saved_position');
        if (pos && pos.x !== undefined) {
          invoke('move_window', { x: pos.x, y: pos.y }).catch(() => {});
        }
      } catch(e) {}

      startAnimation();
      try {
        const { listen } = await window.__TAURI__.event;
        await listen('mascot-state-change', (event) => {
          const s = event.payload?.state;
          if (s && currentState !== 'Petted' && currentState !== 'Pop') {
            setState(s === 'Attention' ? 'Error' : s);
          }
        });
      } catch (e) { console.error('[Perch] Failed to listen:', e); }
    }
    init();
  </script>
</body>
</html>
